<!doctype html>
<html lang="{{ page.locale }}">
    <head>
        <meta charset="utf-8">

        <title>{{ page.title }}</title>

        <meta name="description" content="{{ page.description }}">

        <meta name="viewport" content="width=device-width, initial-scale=1">

        <meta id="og-type" property="og:type" content="{{ page.open_graph.type }}">
        <meta id="og-title" property="og:title" content="{{ page.open_graph.title }}">
        <meta id="og-description" property="og:description" content="{{ page.open_graph.description }}">
        <meta id="og-url" property="og:url" content="{{ page.open_graph.url }}">
        <meta id="og-locale" property="og:locale" content="{{ page.open_graph.locale }}">
        <meta id="og-image" property="og:image" content="{{ page.open_graph.image.url }}">

        <link id="link-canonical" rel="canonical" href="{{ page.canonical_url }}" />

        <link id="link-stylesheet" rel="stylesheet" href="/stylesheets/{{ build_id }}/website.css">
    </head>
    <body>
        {{> components/branded-page-header.html }}
        <main>{{unescape body }}</main>
    </body>
</html>
